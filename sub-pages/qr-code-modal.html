<!doctype html>
<html lang="en">

    <body>

            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="qrCodeModalLabel"><div data-i18n="textQRCode">QR Code</div></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body text-center">
                        <div id="qrCodeContainer" aria-label="QR code for link"></div>
                        <p class="mt-3 mb-0 text-break" id="qrCodeModalTitle"></p>
                    </div>
                </div>
            </div>
        </div>
    </body>

</html>

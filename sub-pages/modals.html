<!doctype html>
<html lang="en">

    <body>
        <div class="modal fade" id="qr-code-modal" tabindex="-1" aria-labelledby="qr-code-modal-label" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="qr-code-modal-label"><div data-i18n="text-qr-code">QR Code</div></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body text-center">
                        <div id="qr-code-container" aria-label="QR code for link"></div>
                        <code class="mt-3 mb-0 text-break" id="qr-code-modal-title"></code>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="settings-modal" tabindex="-1" aria-labelledby="settings-modal-label" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="settings-modal-label" data-i18n="text-settings">Settings</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-4">
                            <div class="mb-3">
                                <label for="language-select" class="form-label fw-semibold" data-i18n="text-language">Language</label>
                                <select class="form-select" id="language-select">
                                    <!-- Options will be populated dynamically -->
                                </select>
                            </div>
                            <div class="mb-2 fw-semibold" data-i18n="text-theme">Theme</div>
                            <div class="btn-group d-flex flex-wrap gap-2" role="group">
                                <button type="button" class="btn btn-outline-secondary theme-item flex-fill" data-theme="auto" data-i18n="text-auto">Auto</button>
                                <button type="button" class="btn btn-outline-secondary theme-item flex-fill" data-theme="light" data-i18n="text-light">Light</button>
                                <button type="button" class="btn btn-outline-secondary theme-item flex-fill" data-theme="dark" data-i18n="text-dark">Dark</button>
                            </div>
                        </div>
                        <div class="mb-3 form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="external-links-new-tab-toggle">
                            <label class="form-check-label" for="external-links-new-tab-toggle" data-i18n="text-always-open-external-links-in-a-new-tab">Always open external links in a new tab</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-danger me-auto" id="clear-preferences-btn" data-i18n="text-reset">Clear my preferences</button>
                        <button type="button" class="btn btn-primary" data-bs-dismiss="modal" data-i18n="text-close">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="warning-clearing-preferences-modal" tabindex="-1" aria-labelledby="warning-clearing-preferences-modal-label" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="warning-clearing-preferences-modal-label" data-i18n="text-warning">Warning</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p data-i18n="text-warning-reset-description">If you choose to continue, this will clear your preferences, including language and color scheme settings. After clearing, you will be redirected to the homepage.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="text-cancel">Cancel</button>
                        <button type="button" class="btn btn-danger" id="confirm-clear-preferences-btn" data-i18n="text-continue">Continue</button>
                    </div>
                </div>
            </div>
        </div>
    </body>

</html>

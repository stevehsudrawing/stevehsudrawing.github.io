<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="textSteveHsusLinkHubArtworksAndVideos">Steve Hsu's Link-Hub - Artworks & Videos</title>
    <link rel="icon" href="https://stevehsudrawing.github.io/resources/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://stevehsudrawing.github.io/resources/style-sheets/default.css">
</head>

<body>
    <div id="header"></div>

    <div id="pageContent">
        <div class="container py-4 link-hub-part">
            <div class="row align-items-center">
                <div class="col-8 order-1">
                    <p>
                    <h1 data-i18n="textArtworksAndVideos">Artworks & Videos</h1>
                    </p>
                    <p data-i18n="textArtworksAndVideosIntroduction">
                        Welcome to view my personal artworks and videos through other platforms!
                    </p>
                </div>
                <div class="col-4 order-2 mb-4 mb-0">
                    <div class="img-container">
                        <img src="https://stevehsudrawing.github.io/resources/images/artworks.png" alt="Artworks"
                            class="img-fluid img-cover">
                    </div>
                </div>
            </div>
        </div>
        <div class="divider"></div>
        <div class="container py-4">
            <div class="link-hub-part">
                <p>
                <h2>Artworks</h2>
                </p>
                <p class="row">
                <div class="col-md-6 col-xl-4 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <a href="https://www.pixiv.net/users/70732361">
                                <h6 class="card-title mb-2 text-body-secondary">Pixiv</h6>
                            </a>
                            <p class="card-text">UID: 70732361</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-4 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <a href="https://www.deviantart.com/stevehsudrawing">
                                <h6 class="card-title mb-2 text-body-secondary">DeviantArt</h6>
                            </a>
                            <p class="card-text">UID: stevehsudrawing</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-4 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <a href="https://www.instagram.com/stevehsudrawing">
                                <h6 class="card-title mb-2 text-body-secondary">Instagram</h6>
                            </a>
                            <p class="card-text">UID: stevehsudrawing</p>
                        </div>
                    </div>
                </div>
                </p>
            </div>
            <div class="divider"></div>
            <div class="link-hub-part">
                <p>
                <h2>Videos</h2>
                </p>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://stevehsudrawing.github.io/resources/scripts/functions.js"></script>
    <script src="https://stevehsudrawing.github.io/resources/scripts/initialization.js"></script>
</body>

</html>

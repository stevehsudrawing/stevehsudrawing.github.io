<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title data-i18n="text-steve-hsu-s-link-hub">Steve Hsu's Link-Hub</title>
        <link rel="icon" href="/images/favicon.png" type="image/png">

        <script type="text/javascript" src="/scripts/browser-detection.js"></script>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" crossorigin="anonymous">

        <link rel="stylesheet" href="/style-sheets/basics.css">
        <link rel="stylesheet" href="/style-sheets/accessibility.css">
        <link rel="stylesheet" href="/style-sheets/appearance-behaviors.css">
        <link rel="stylesheet" href="/style-sheets/mono-img.css">
        <link rel="stylesheet" href="/style-sheets/navbar.css">
        <link rel="stylesheet" href="/style-sheets/qr-code-modal.css">

        <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

        <script src="/scripts/bootstrap-css-detection.js"></script>
        <script src="/scripts/basics.js"></script>
        <script src="/scripts/accessibility.js"></script>
        <script src="/scripts/appearance-behaviors.js"></script>
        <script src="/scripts/i18n.js"></script>
        <script src="/scripts/link-cards-generator.js"></script>
        <script src="/scripts/qr-code-modal.js"></script>
        <script src="/scripts/settings.js"></script>
        <script src="/scripts/theme.js"></script>
    </head>

    <body>
        <div id="header" data-component></div>

        <div id="page-content">
            <div class="container py-4 link-hub-part">
                <div class="d-flex align-items-center">
                    <div class="flex-grow-1">
                        <h1 data-i18n="text-artworks-and-videos">Artworks & Videos</h1>
                        <p data-i18n="text-artworks-and-videos-introduction">
                            Welcome to view my personal artworks and videos through other platforms!
                        </p>
                    </div>
                    <div class="container-img-cover-sub">
                        <img src="/images/covers/artworks-light.png" data-src-dark="/images/covers/artworks-dark.png" alt="Artworks" class="img-fluid img-fit rounded">
                    </div>
                </div>
            </div>
            <hr>
            <div class="container" id="links"></div>
        </div>

        <div id="footer" data-component></div>
        <div id="qr-code-modal" data-component></div>
        <div id="settings-modal" data-component></div>

        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
        <script src="/scripts/page-transition.js"></script>
        <script src="/scripts/initialization.js"></script>
    </body>

</html>

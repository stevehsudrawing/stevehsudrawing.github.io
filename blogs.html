<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title data-i18n="textSteveHsusLinkHubBlogs">Steve Hsu's Link-Hub - Blogs</title>
        <link rel="icon" href="https://stevehsudrawing.github.io/resources/images/favicon.png" type="image/png">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" crossorigin="anonymous">
        <link rel="stylesheet" href="https://stevehsudrawing.github.io/resources/style-sheets/default.css">
    </head>

    <body>
        <div id="header"></div>

        <div id="pageContent">
            <div class="container py-4 link-hub-part">
                <div class="d-flex align-items-center">
                    <div class="flex-grow-1">
                        <p>
                        <h1 data-i18n="textBlogs">Blogs</h1>
                        </p>
                        <p data-i18n="textBlogsIntroduction">
                            Welcome to read my blogs about me or my projects!
                        </p>
                    </div>
                    <div class="container-img-cover-sub">
                        <img src="https://stevehsudrawing.github.io/resources/images/blogs.png" alt="Blogs" class="img-fluid img-fit">
                    </div>
                </div>
            </div>
            <hr>
            <div class="container py-4">
                <div class="link-hub-part">
                    <p>
                    <div class="row g-2">
                        <div class="col-lg-6 col-xxl-4">
                            <div class="card">
                                <div class="d-flex card-body">
                                    <div class="container-img-link-icon">
                                        <img alt="Patreon" src="https://stevehsudrawing.github.io/resources/images/null.png" class="img-fluid img-fit img-mono-patreon img-mono-fill-body-color">
                                    </div>
                                    <div class="flex-grow-1">
                                        <a href="https://www.patreon.com/QuantoSeries">
                                            <h6 class="card-title">
                                                Patreon (<span data-i18n="textQuantoSeries">Quanto Series</span>)
                                                <i class="bi bi-box-arrow-up-right align-top bi-additional"></i>
                                            </h6>
                                        </a>
                                        <p class="card-text">UID: QuantoSeries</span></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-6 col-xxl-4">
                            <div class="card">
                                <div class="d-flex card-body">
                                    <div class="container-img-link-icon">
                                        <img alt="Afdian" src="https://stevehsudrawing.github.io/resources/images/afdian.png" class="img-fluid img-fit">
                                    </div>
                                    <div class="flex-grow-1">
                                        <a href="https://afdian.com/a/stevehsu">
                                            <h6 class="card-title">
                                                <span data-i18n="textAfdian">Afdian</span>
                                                <i class="bi bi-box-arrow-up-right align-top bi-additional"></i>
                                            </h6>
                                        </a>
                                        <p class="card-text">UID: stevehsu</span></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    </p>
                </div>
            </div>
        </div>

        <div id="footer"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
        <script src="https://stevehsudrawing.github.io/resources/scripts/functions.js"></script>
        <script src="https://stevehsudrawing.github.io/resources/scripts/initialization.js"></script>
    </body>

</html>

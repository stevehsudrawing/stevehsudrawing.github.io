<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title data-i18n="textSteveHsusLinkHubOpenSourceProjects">Steve Hsu's Link-Hub - Open-Source Projects</title>
        <script src="https://stevehsudrawing.github.io/resources/scripts/browser-detection.js"></script>
        <link rel="icon" href="https://stevehsudrawing.github.io/resources/images/favicon.png" type="image/png">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" crossorigin="anonymous">
        <link rel="stylesheet" href="https://stevehsudrawing.github.io/resources/style-sheets/default.css">
    </head>

    <body>
        <div id="header"></div>

        <div id="pageContent">
            <div class="container py-4 link-hub-part">
                <div class="d-flex align-items-center">
                    <div class="flex-grow-1">
                        <p>
                        <h1 data-i18n="textOpenSourceProjects">Open-Source Projects</h1>
                        </p>
                        <p data-i18n="textOpenSourceProjectsIntroduction">
                            Welcome to view my open-source projects!
                        </p>
                        <p class="m-0 border-0">
                            <a class="btn btn-secondary" href="https://github.com/stevehsudrawing">
                                <i class="bi bi-github"></i>
                                <span data-i18n="textMyGitHubPage">My GitHub Page</span>
                                <i class="bi bi-box-arrow-up-right align-top bi-additional"></i>
                            </a>
                        </p>
                    </div>
                    <div class="container-img-cover-sub">
                        <img src="https://stevehsudrawing.github.io/resources/images/projects.png" alt="Projects" class="img-fluid img-fit">
                    </div>
                </div>
            </div>
            <hr>
            <div class="container py-4">
                <div class="link-hub-part">
                    <p>
                    <h2 data-i18n="textQuantoSeries">Quanto Series</h2>
                    </p>
                    <p>
                    <div class="row g-2">
                        <div class="col-lg-6 col-xxl-4 opacity-75">
                            <div class="card">
                                <div class="d-flex card-body">
                                    <div class="container-img-link-icon">
                                        <img alt="Quanto Ult" src="https://stevehsudrawing.github.io/resources/images/quanto-ult.png" class="img-fluid img-fit">
                                    </div>
                                    <div class="flex-grow-1">
                                        <!-- <a href="https://github.com/stevehsudrawing/QuantoUlt" aria-disabled="true"> -->
                                        <h6 class="card-title">
                                            Quanto Ult
                                            <!-- <i class="bi bi-box-arrow-up-right align-top bi-additional"></i> -->
                                        </h6>
                                        <!-- </a> -->
                                        <p class="card-text"><span data-i18n="textName">Name</span>: QuantoUlt / <span data-i18n="textComingSoon">Coming soon</span></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-6 col-xxl-4">
                            <div class="card">
                                <div class="d-flex card-body">
                                    <div class="container-img-link-icon">
                                        <img alt="Quanto Flx" src="https://stevehsudrawing.github.io/resources/images/quanto-flx.png" class="img-fluid img-fit">
                                    </div>
                                    <div class="flex-grow-1">
                                        <a href="https://github.com/stevehsudrawing/quantoflx">
                                            <h6 class="card-title">
                                                Quanto Flx
                                                <i class="bi bi-box-arrow-up-right align-top bi-additional"></i>
                                            </h6>
                                        </a>
                                        <p class="card-text"><span data-i18n="textName">Name</span>: quantoflx</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-6 col-xxl-4">
                            <div class="card">
                                <div class="d-flex card-body">
                                    <div class="container-img-link-icon">
                                        <img alt="Quanto Original" src="https://stevehsudrawing.github.io/resources/images/null.png" class="img-fluid img-fit img-mono-github img-mono-fill-body-color">
                                    </div>
                                    <div class="flex-grow-1">
                                        <a href="https://github.com/stevehsudrawing/quanto">
                                            <h6 class="card-title">
                                                Quanto Original
                                                <i class="bi bi-box-arrow-up-right align-top bi-additional"></i>
                                            </h6>
                                        </a>
                                        <p class="card-text"><span data-i18n="textName">Name</span>: quanto / <span data-i18n="textArchived">Archived</span></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    </p>
                </div>
            </div>
        </div>

        <div id="footer"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
        <script src="https://stevehsudrawing.github.io/resources/scripts/functions.js"></script>
        <script src="https://stevehsudrawing.github.io/resources/scripts/initialization.js"></script>

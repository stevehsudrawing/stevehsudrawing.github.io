<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">

        <script type="text/javascript" src="/scripts/browser-detection.js"></script>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" crossorigin="anonymous">
        <link rel="stylesheet" href="/style-sheets/default.css">
        <link rel="stylesheet" href="/style-sheets/responsive-layouts.css">

        <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <body>
        <div id="header"></div>

        <div id="page-content">
            <div class="container py-4 link-hub-part">

                    <div class="container-img-cover-sub">

        <div id="footer"></div>
        <div id="qrCodeModalContainer"></div>

        <script src="/scripts/link-cards-generator.js"></script>

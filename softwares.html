<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Steve Hsu's Link-Hub</title>
        <link rel="icon" href="/images/favicon.png" type="image/png">

        <script type="text/javascript" src="/scripts/detections/browser.js"></script>

        <link rel="preconnect" href="https://cdn.jsdelivr.net/">
        <link rel="preconnect" href="https://rsms.me/">

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" crossorigin="anonymous">
        <link rel="stylesheet" href="https://rsms.me/inter/inter.css" crossorigin="anonymous">

        <link rel="stylesheet" href="/stylesheets/base.css">
        <link rel="stylesheet" href="/stylesheets/color-scheme.css">
        <link rel="stylesheet" href="/stylesheets/fonts.css">
        <link rel="stylesheet" href="/stylesheets/components.css">
        <link rel="stylesheet" href="/stylesheets/mono-img.css">

        <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/downloadjs@1.4.7/download.min.js"></script>

        <script src="/scripts/functions/utils.js"></script>
        <script src="/scripts/functions/component-loader.js"></script>
        <script src="/scripts/functions/bootstrap-css-detection.js"></script>
        <script src="/scripts/functions/accessibility.js"></script>
        <script src="/scripts/functions/navbar.js"></script>
        <script src="/scripts/functions/tooltips.js"></script>
        <script src="/scripts/functions/scroll-hint.js"></script>
        <script src="/scripts/functions/i18n.js"></script>
        <script src="/scripts/functions/qr-code.js"></script>
        <script src="/scripts/functions/link-cards-generator.js"></script>
        <script src="/scripts/functions/page-transition.js"></script>
        <script src="/scripts/functions/theme.js"></script>
        <script src="/scripts/functions/settings.js"></script>
        <script src="/scripts/functions/loading-screen.js"></script>
        <script src="/scripts/functions/page-title.js"></script>

        <script src="/scripts/init-at-head.js"></script>
    </head>

    <body>
        <div id="loading-screen" class="loading-screen">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
        <div id="header" data-component></div>

        <div id="page-content">
            <div class="container py-4 link-hub-part">
                <div class="d-flex align-items-center">
                    <div class="flex-grow-1">
                        <p>
                        <h1 data-i18n="text-softwares">Softwares</h1>
                        </p>
                        <p data-i18n="text-softwares-introduction">
                            Welcome to view my softwares!
                        </p>
                        <div>
                            <a class="link external-link larger-link fw-semibold" href="https://github.com/stevehsudrawing">
                                <i class="bi bi-github"></i>
                                <span data-i18n="text-my-github-profile">My GitHub Profile</span>
                            </a>
                        </div>
                    </div>
                    <div class="sub-cover-wrapper ms-2">
                        <img src="/images/covers/projects.png" alt="Projects" class="img-fluid img-fit rounded">
                    </div>
                </div>
            </div>
            <hr>
            <div class="container" id="links"></div>
        </div>

        <div id="footer" data-component></div>
        <div id="modals" data-component></div>

        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

        <script src="/scripts/init-final.js"></script>
    </body>

</html>

<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    </head>

    <body>
        <noscript>
            <div style="padding:2rem;font-family:sans-serif;">
                <h2 class="pseudo-h1">Softwares - Steve Hsu (什五)'s Link-Hub</h2>
                <p>Discover software projects by Steve Hsu (什五), including the Quanto Series and other development tools and utilities.</p>
            </div>
        </noscript>

        <div id="loading-screen" class="loading-screen">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <div data-role="page-component" data-component-name="header"></div>

        <div id="page-content">
            <div class="container py-4 link-hub-part">
                <div class="d-flex align-items-center flex-wrap">
                    <div class="col-12 col-md-8 col-lg-9 order-md-1 order-2">
                        <h1 data-i18n="text-softwares">Softwares</h1>
                        <p data-i18n="text-softwares-description">
                            Welcome to view my softwares!
                        </p>
                        <div>
                            <a class="link link-hover-change-background external-link larger-link fw-semibold" href="https://github.com/stevehsudrawing" data-link-img-props='{"alt":"Github","src":"/images/webp/null.webp","dataImgFeature":"colored","dataSrcMask":"/images/webp/icons/github.webp","dataColorVar":"bs-body-color"}'>
                                <i class="bi bi-github"></i>
                                <span data-i18n="text-my-github-profile">My GitHub Profile</span>
                            </a>
                        </div>
                    </div>
                    <div class="sub-cover-wrapper col-md-3 order-md-2 order-1 mb-4 mb-md-0">
                        <img alt="Softwares" data-i18n-alt="text-softwares" src="/images/webp/covers/projects.webp" class="img-fluid img-fit rounded">
                    </div>
                </div>
            </div>
            <hr>
            <div class="container" id="links"></div>
        </div>

        <div data-role="page-component" data-component-name="footer"></div>
        <div data-role="page-component" data-component-name="modals"></div>

    </body>

</html>
